      try {
          Object.defineProperty(window, 'localStorage', {
              value: window.localStorage,
              writable: false,
              configurable: false
          });
      } catch(e) {}

      function getLocalUrl(rawUrl) {
          if (typeof rawUrl !== 'string') return rawUrl;
          if (rawUrl.includes('api.gx.games') || rawUrl.includes('opera-api.com')) return 'mock-json';
          const fileMatch = rawUrl.match(/(runner\.js|runner\.wasm|runner\.data|runner\.json|game\.unx|_buildManifest\.js)/);
          if (fileMatch) return new URL('./' + fileMatch[1], window.location.href).href;
          return rawUrl;
      }

      const mockPayload = {
          data: { 
              title: "Leaf Blower Idle", 
              gameId: "local-dev", 
              version: "1.0.0", 
              manifest: { version: "1.0.0", scavenged: true },
              player: { id: "local-user", name: "Player", anonymous: false },
              saveState: { exists: true, slot: "default" }
          },
          status: "success", valid: true
      };

      const originalFetch = window.fetch;
      window.fetch = async function(...args) {
          let url = args[0];
          const targetsLocal = getLocalUrl(url);
          if (targetsLocal === 'mock-json' || (typeof url === 'string' && url.includes('states'))) {
              return new Response(JSON.stringify(mockPayload), { status: 200, headers: {'Content-Type': 'application/json'} });
          }
          if (targetsLocal !== url) args[0] = targetsLocal;
          return originalFetch(...args);
      };

      const originalOpen = XMLHttpRequest.prototype.open;
      XMLHttpRequest.prototype.open = function(method, url, ...args) {
          const targetsLocal = getLocalUrl(url);
          if (targetsLocal === 'mock-json' || (typeof url === 'string' && url.includes('states'))) {
              url = 'data:application/json,' + encodeURIComponent(JSON.stringify(mockPayload));
          } else {
              url = targetsLocal;
          }
          return originalOpen.call(this, method, url, ...args);
      };

      const OriginalWorker = window.Worker;
      window.Worker = function(workerUrl, options) {
          if (typeof workerUrl === 'string' && !workerUrl.startsWith('http')) {
              workerUrl = new URL(workerUrl, window.location.origin + window.location.pathname).href;
          }
          return new OriginalWorker(workerUrl, options);
      };

      const originalJson = Response.prototype.json;
      Response.prototype.json = async function() {
          try { return await originalJson.call(this); } catch (err) { return mockPayload; }
      };
    </script>

    <!-- CRITICAL FIX: Intercept and force correct canvas dimensions -->
    <script>
      (function() {
        console.log('[Fix] Starting canvas fix...');
        
        // Store the original function
        const originalOnGameSetWindowSize = window.onGameSetWindowSize;
        
        // Override it to force our dimensions AND log what the game tries to set
        window.onGameSetWindowSize = function(width, height) {
          console.log(`[Fix] Game tried to set size to: ${width}x${height}`);
          
          // Force the correct dimensions (1920x1080 for 16:9)
          // If the game passed 0 or 1, we override it
          const forcedWidth = (width <= 1) ? 1920 : width;
          const forcedHeight = (height <= 1) ? 1080 : height;
          
          console.log(`[Fix] Forcing size to: ${forcedWidth}x${forcedHeight}`);
          
          // Call the original with our forced dimensions
          return originalOnGameSetWindowSize(forcedWidth, forcedHeight);
        };
        
        // Also manually call it once the canvas exists
        function forceCanvasSize() {
          const canvas = document.querySelector('canvas');
          if (canvas) {
            console.log('[Fix] Canvas found, forcing size');
            window.onGameSetWindowSize(1920, 1080);
          } else {
            setTimeout(forceCanvasSize, 100);
          }
        }
        
        forceCanvasSize();
        
        // Also monitor for canvas being recreated
        const observer = new MutationObserver(() => {
          const canvas = document.querySelector('canvas');
          if (canvas) {
            console.log('[Fix] Canvas detected, forcing size again');
            window.onGameSetWindowSize(1920, 1080);
          }
        });
        observer.observe(document.body, { childList: true, subtree: true });
      })();
    </script>
