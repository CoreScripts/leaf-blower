<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Leaf Blower Idle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        .game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        canvas {
            display: block;
            background: #000;
        }
    </style>
    
    <!-- Set base path -->
    <script>
        const basePath = window.location.pathname.split("/").slice(0, -1).join("/") + "/";
        const base = document.createElement("base");
        base.href = basePath;
        document.head.appendChild(base);
    </script>

    <!-- MOCK ALL EXTERNAL API CALLS -->
    <script>
        // Mock data for GX.games API
        const MOCK_GAME_DATA = {
            data: {
                title: "Leaf Blower Idle",
                gameId: "local-dev",
                trackId: "",
                releaseId: "",
                coverImage: "",
                gamePlayId: "mock-gameplay-id",
                clientId: "mock-client-id",
                sessionId: "mock-session-id",
                feSessionId: "mock-fe-session-id"
            }
        };

        // Mock runner.json (the game's manifest)
        const MOCK_RUNNER = {
            mainJS: "game.unx",
            manifestFiles: ["game.unx"],
            legacyRunner: true
        };

        // Store original fetch
        const originalFetch = window.fetch;
        
        // Override fetch to mock external APIs
        window.fetch = async function(url, options) {
            const urlStr = typeof url === 'string' ? url : url.url;
            
            console.log('[Mock] Fetch:', urlStr);
            
            // Mock GX.games API calls
            if (urlStr.includes('api.gx.games') || urlStr.includes('play.gx.games')) {
                console.log('[Mock] Intercepted GX API call, returning mock data');
                return new Response(JSON.stringify(MOCK_GAME_DATA), {
                    status: 200,
                    headers: { 'Content-Type': 'application/json' }
                });
            }
            
            // Mock runner.json (prevent CORS errors)
            if (urlStr.includes('runner.json')) {
                console.log('[Mock] Intercepted runner.json request, returning mock manifest');
                return new Response(JSON.stringify(MOCK_RUNNER), {
                    status: 200,
                    headers: { 'Content-Type': 'application/json' }
                });
            }
            
            // Mock Sentry (error tracking)
            if (urlStr.includes('sentry-relay.opera-api.com')) {
                console.log('[Mock] Blocked Sentry request');
                return new Response('OK', { status: 200 });
            }
            
            // Let all other requests through (local assets)
            return originalFetch(url, options);
        };
        
        // Mock XMLHttpRequest for same APIs
        const originalXHROpen = XMLHttpRequest.prototype.open;
        XMLHttpRequest.prototype.open = function(method, url, ...args) {
            this._url = url;
            if (typeof url === 'string' && 
                (url.includes('api.gx.games') || 
                 url.includes('play.gx.games') || 
                 url.includes('runner.json') ||
                 url.includes('sentry-relay.opera-api.com'))) {
                console.log('[Mock] XHR intercepted:', url);
                // Return mock response immediately
                setTimeout(() => {
                    if (this.onload) {
                        Object.defineProperty(this, 'response', {
                            value: JSON.stringify(url.includes('runner.json') ? MOCK_RUNNER : MOCK_GAME_DATA)
                        });
                        Object.defineProperty(this, 'status', { value: 200 });
                        this.onload();
                    }
                }, 10);
                return;
            }
            return originalXHROpen.call(this, method, url, ...args);
        };
        
        // Mock Service Worker (not available on GitHub Pages)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register = function() {
                console.log('[Mock] ServiceWorker registration blocked');
                return Promise.reject(new Error('ServiceWorker not supported in this context'));
            };
        }
        
        console.log('[Mock] All external API mocks initialized');
    </script>

    <!-- Mock localStorage -->
    <script>
        if (typeof localStorage === 'undefined' || !localStorage.getItem) {
            let store = {};
            window.localStorage = {
                getItem: (key) => store[key] || null,
                setItem: (key, value) => { store[key] = value.toString(); },
                removeItem: (key) => { delete store[key]; },
                clear: () => { store = {}; }
            };
        }
    </script>
</head>

    <!-- CANVAS SCALING FIX -->
    <script>
        (function() {
            const GAME_WIDTH = 1024;
            const GAME_HEIGHT = 768;
            const GAME_ASPECT = GAME_WIDTH / GAME_HEIGHT;

            let canvas = null;
            let container = null;
            let resizeTimeout = null;

            function resizeCanvas() {
                if (!canvas || !container) {
                    canvas = document.querySelector('canvas');
                    container = document.querySelector('.game-container');
                    if (!canvas || !container) {
                        setTimeout(resizeCanvas, 100);
                        return;
                    }
                    if (canvas.parentElement !== container) {
                        container.appendChild(canvas);
                    }
                }

                const containerWidth = container.clientWidth;
                const containerHeight = container.clientHeight;
                const containerAspect = containerWidth / containerHeight;

                let newWidth, newHeight;

                if (containerAspect > GAME_ASPECT) {
                    newHeight = containerHeight;
                    newWidth = newHeight * GAME_ASPECT;
                } else {
                    newWidth = containerWidth;
                    newHeight = newWidth / GAME_ASPECT;
                }

                canvas.style.width = `${newWidth}px`;
                canvas.style.height = `${newHeight}px`;
                canvas.width = GAME_WIDTH;
                canvas.height = GAME_HEIGHT;

                if (typeof window.onGameSetWindowSize === 'function') {
                    window.onGameSetWindowSize(Math.round(newWidth), Math.round(newHeight));
                }

                console.log(`[Resize] Canvas: ${newWidth}x${newHeight}`);
            }

            function handleResize() {
                if (resizeTimeout) clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(resizeCanvas, 100);
            }

            function init() {
                resizeCanvas();
                window.addEventListener('resize', handleResize);
                window.addEventListener('orientationchange', handleResize);
                
                const observer = new MutationObserver(() => {
                    if (document.querySelector('canvas') !== canvas) {
                        canvas = null;
                        resizeCanvas();
                    }
                });
                observer.observe(document.body, { childList: true, subtree: true });
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
