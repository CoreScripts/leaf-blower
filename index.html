      window.fetch = async function(...args) {
          let url = args[0];
          if (typeof url === 'string') {
              // Catch the broken play.gx.games URL and force it to load your local file instead
              if (url.includes('runner.js')) {
                  return originalFetch('./runner.js');
              }
              // Prevent the profile check crash
              if (url.includes('api.gx.games')) {
                  return new Response(JSON.stringify({ data: {} }), { status: 200, headers: {'Content-Type': 'application/json'} });
              }
          }
          return originalFetch(...args);
      };
