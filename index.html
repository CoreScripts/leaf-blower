        margin: 0 !important;

          height: auto !important;

      }

      function getLocalUrl(rawUrl) {
          if (typeof rawUrl !== 'string') return rawUrl;
          if (rawUrl.includes('api.gx.games') || rawUrl.includes('opera-api.com')) return 'mock-json';
          const fileMatch = rawUrl.match(/(runner\.js|runner\.wasm|runner\.data|runner\.json|game\.unx|_buildManifest\.js)/);
          if (fileMatch) return new URL('./' + fileMatch[1], window.location.href).href;
          return rawUrl;
      }

      const mockPayload = {
          data: { 
              title: "Leaf Blower Idle", 
              gameId: "local-dev", 
              version: "1.0.0", 
              manifest: { version: "1.0.0", scavenged: true },
              player: { id: "local-user", name: "Player", anonymous: false },
              saveState: { exists: true, slot: "default" }
          },
          status: "success", valid: true
      };

      const originalFetch = window.fetch;
      window.fetch = async function(...args) {
          let url = args[0];
          const targetsLocal = getLocalUrl(url);
          if (targetsLocal === 'mock-json' || (typeof url === 'string' && url.includes('states'))) {
              return new Response(JSON.stringify(mockPayload), { status: 200, headers: {'Content-Type': 'application/json'} });
          }
          if (targetsLocal !== url) args[0] = targetsLocal;
          return originalFetch(...args);
      };

      const originalOpen = XMLHttpRequest.prototype.open;
      XMLHttpRequest.prototype.open = function(method, url, ...args) {
          const targetsLocal = getLocalUrl(url);
          if (targetsLocal === 'mock-json' || (typeof url === 'string' && url.includes('states'))) {
              url = 'data:application/json,' + encodeURIComponent(JSON.stringify(mockPayload));
          } else {
              url = targetsLocal;
          }
          return originalOpen.call(this, method, url, ...args);
      };

      const OriginalWorker = window.Worker;
      window.Worker = function(workerUrl, options) {
          if (typeof workerUrl === 'string' && !workerUrl.startsWith('http')) {
              workerUrl = new URL(workerUrl, window.location.origin + window.location.pathname).href;
          }
          return new OriginalWorker(workerUrl, options);
      };

      const originalJson = Response.prototype.json;
      Response.prototype.json = async function() {
          try { return await originalJson.call(this); } catch (err) { return mockPayload; }
      };
    </script>

    <!-- FORCE FULL-WIDTH ON MOBILE -->
    <script>
      (function() {
        console.log('[Fix] Starting canvas fix for full-width display...');
        
        function applyCanvasFix() {
          const canvas = document.querySelector('canvas');
          if (!canvas) {
            setTimeout(applyCanvasFix, 100);
            return;
          }
          
          console.log('[Fix] Canvas found, applying full-width fix');
          
          // Wrap canvas in a container if not already wrapped
          let container = canvas.parentElement;
          if (!container.classList.contains('canvas-container')) {
            const newContainer = document.createElement('div');
            newContainer.className = 'canvas-container';
            container.insertBefore(newContainer, canvas);
            newContainer.appendChild(canvas);
            container = newContainer;
          }
          
          // Force canvas styles
          canvas.style.display = 'block';
          canvas.style.margin = '0';
          canvas.style.position = 'relative';
          
          // Force full width on mobile
          function updateCanvasSize() {
            const isPortrait = window.innerHeight > window.innerWidth;
            
            if (isPortrait) {
              // Portrait: fill width, let height adjust
              canvas.style.width = '100%';
              canvas.style.height = 'auto';
              canvas.style.maxHeight = '100vh';
            } else {
              // Landscape: fill height, let width adjust  
              canvas.style.width = 'auto';
              canvas.style.height = '100%';
              canvas.style.maxWidth = '100vw';
            }
            
            // Notify wrapper of new dimensions
            if (typeof window.onGameSetWindowSize === 'function') {
              window.onGameSetWindowSize(canvas.offsetWidth, canvas.offsetHeight);
            }
          }
          
          // Initial update
          updateCanvasSize();
          
          // Update on resize and orientation change
          window.addEventListener('resize', updateCanvasSize);
          window.addEventListener('orientationchange', updateCanvasSize);
          
          // Also force the game's internal display size
          Object.defineProperty(window, 'g_ActualDisplayWidth', {
            get: function() { return canvas.offsetWidth; },
            configurable: true
          });
          
          Object.defineProperty(window, 'g_ActualDisplayHeight', {
            get: function() { return canvas.offsetHeight; },
            configurable: true
          });
        }
        
        // Start fix
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', applyCanvasFix);
        } else {
          applyCanvasFix();
        }
        
        // Also monitor for canvas being recreated
        const observer = new MutationObserver(() => {
          const canvas = document.querySelector('canvas');
          if (canvas && canvas.style.width !== '100%') {
            applyCanvasFix();
          }
        });
        observer.observe(document.body, { childList: true, subtree: true });
      })();
    </script>
