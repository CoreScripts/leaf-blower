    <script>
      // Force all network requests for game assets to redirect locally, bypassing Opera's servers
      const originalFetch = window.fetch;
      window.fetch = async function(...args) {
          let url = args[0];
          if (typeof url === 'string') {
              if (url.includes('runner.json')) return originalFetch('./runner.json');
              if (url.includes('runner.wasm')) return originalFetch('./runner.wasm');
              if (url.includes('runner.data')) return originalFetch('./runner.data');
              if (url.includes('game.unx')) return originalFetch('./game.unx');
              if (url.includes('_buildManifest.js')) return originalFetch('./_buildManifest.js');
              if (url.includes('api.gx.games')) {
                  // Fake a successful response for the server check so it doesn't crash
                  return new Response(JSON.stringify({}), { status: 200, headers: {'Content-Type': 'application/json'} });
              }
          }
          return originalFetch(...args);
      };

      const originalOpen = XMLHttpRequest.prototype.open;
      XMLHttpRequest.prototype.open = function(method, url, ...args) {
          if (typeof url === 'string') {
              if (url.includes('runner.json')) url = './runner.json';
              else if (url.includes('runner.wasm')) url = './runner.wasm';
              else if (url.includes('runner.data')) url = './runner.data';
              else if (url.includes('game.unx')) url = './game.unx';
              else if (url.includes('_buildManifest.js')) url = './_buildManifest.js';
          }
          return originalOpen.call(this, method, url, ...args);
      };
    </script>
