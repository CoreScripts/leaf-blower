<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Leaf Blower Idle</title>
    <style>
        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* Container centers the canvas */
        .game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        /* Canvas gets explicit pixel dimensions set by JS */
        canvas {
            display: block;
            background: #000;
        }
    </style>
</head>
<body>
    <div class="game-container"></div>

    <!-- Mock localStorage for game saves -->
    <script>
        if (typeof localStorage === 'undefined') {
            let store = {};
            window.localStorage = {
                getItem: (key) => store[key] || null,
                setItem: (key, value) => { store[key] = value.toString(); },
                removeItem: (key) => { delete store[key]; },
                clear: () => { store = {}; }
            };
        }
    </script>

    <!-- Load the game's runner -->
    <script src="runner.js"></script>

    <!-- SCALING FIX: Calculate proper canvas dimensions based on game's native resolution -->
    <script>
        (function() {
            // Game's native resolution (from framework analysis: 1024x768, 4:3 aspect ratio)
            const GAME_WIDTH = 1024;
            const GAME_HEIGHT = 768;
            const GAME_ASPECT = GAME_WIDTH / GAME_HEIGHT; // 1.333...

            let canvas = null;
            let container = null;

            function resizeCanvas() {
                if (!canvas || !container) {
                    canvas = document.querySelector('canvas');
                    container = document.querySelector('.game-container');
                    if (!canvas || !container) {
                        setTimeout(resizeCanvas, 100);
                        return;
                    }
                    // Move canvas into container if needed
                    if (canvas.parentElement !== container) {
                        container.appendChild(canvas);
                    }
                }

                // Get available screen size
                const containerWidth = container.clientWidth;
                const containerHeight = container.clientHeight;
                const containerAspect = containerWidth / containerHeight;

                let newWidth, newHeight;

                // Calculate dimensions to fit while preserving aspect ratio
                if (containerAspect > GAME_ASPECT) {
                    // Container is wider than game → fit to height
                    newHeight = containerHeight;
                    newWidth = newHeight * GAME_ASPECT;
                } else {
                    // Container is taller than game → fit to width
                    newWidth = containerWidth;
                    newHeight = newWidth / GAME_ASPECT;
                }

                // Apply explicit pixel dimensions
                canvas.style.width = `${newWidth}px`;
                canvas.style.height = `${newHeight}px`;
                
                // Also set canvas intrinsic dimensions for game rendering
                canvas.width = GAME_WIDTH;
                canvas.height = GAME_HEIGHT;

                // Notify the game wrapper about the new size
                if (typeof window.onGameSetWindowSize === 'function') {
                    window.onGameSetWindowSize(newWidth, newHeight);
                }

                console.log(`[Resize] Container: ${containerWidth}x${containerHeight} → Canvas: ${newWidth}x${newHeight}`);
            }

            // Initial setup
            function init() {
                resizeCanvas();
                window.addEventListener('resize', resizeCanvas);
                window.addEventListener('orientationchange', resizeCanvas);
                
                // Also watch for canvas being recreated
                const observer = new MutationObserver(() => {
                    if (document.querySelector('canvas') !== canvas) {
                        canvas = null;
                        resizeCanvas();
                    }
                });
                observer.observe(document.body, { childList: true, subtree: true });
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
