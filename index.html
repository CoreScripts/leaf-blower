    <title>Leaf Blower Idle</title>

    <script>
      // 1. Route core game files locally no matter what
      const originalFetch = window.fetch;
      window.fetch = async function(...args) {
          let url = args[0];
          if (typeof url === 'string') {
              if (url.includes('runner.js')) return originalFetch('./runner.js');
              if (url.includes('runner.wasm')) return originalFetch('./runner.wasm');
              if (url.includes('runner.data')) return originalFetch('./runner.data');
              if (url.includes('game.unx')) return originalFetch('./game.unx');
              if (url.includes('runner.json')) return originalFetch('./runner.json');
          }
          return originalFetch(...args);
      };

      // 2. Global JSON Crash Guard: Catch any broken server data and inject clean fallback configurations
      const originalJson = Response.prototype.json;
      Response.prototype.json = async function() {
          try {
              return await originalJson.call(this);
          } catch (err) {
              console.warn("Caught and patched a broken JSON response from:", this.url);
              return {
                  data: {
                      title: "Leaf Blower Idle",
                      gameId: "local-dev",
                      version: "1.0.0",
                      manifest: {
                          version: "1.0.0",
                          scavenged: true
                      }
                  },
                  status: "success",
                  valid: true
              };
          }
      };
    </script>

    <script>
      {
        const basePath = window.location.pathname.split("/").slice(0, -1).join("/") + "/"
        const base = document.createElement("base")
        base.href = basePath
        document.head.appendChild(base)
        window.__assetsPath = path => basePath + (path || "")
      }
    </script>
